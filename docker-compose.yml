services:
  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DB_BACKEND: ${DB_BACKEND:-sqlite}
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
